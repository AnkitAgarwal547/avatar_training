on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          envs: APP_PATH
          script: |
            set -e
            cd $APP_PATH

            pm2 stop avatar-backend || true
            pm2 stop avatar-frontend || true

            git fetch origin main
            git reset --hard origin/main

            cd avatar-training-node-js
            npm install
            pm2 restart avatar-backend || pm2 start "npm start" --name avatar-backend
            pm2 save

            cd $APP_PATH/avatar-training-next-js
            npm install
            npm run build
            pm2 restart avatar-frontend || pm2 start "npm run start:prod" --name avatar-frontend
            pm2 save

            if [ -f $APP_PATH/ai.deaninfotech.com ]; then
              sudo cp $APP_PATH/ai.deaninfotech.com /etc/nginx/sites-available/ai.deaninfotech.com
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "Deployment of AI Avatar to $APP_PATH completed successfully."
